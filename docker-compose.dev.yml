services:
  mysql:
    image: mysql:8.4
    container_name: geocoder-mysql-dev
    environment:
      MYSQL_DATABASE: ${SQL_DATABASE:-geocoder}
      MYSQL_USER: ${SQL_USER:-geocoder}
      MYSQL_PASSWORD: ${SQL_PASSWORD:-geocoder}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    ports:
      - "${SQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
